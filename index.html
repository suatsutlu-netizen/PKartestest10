<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#E8734A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Conjugaison">
  <meta name="description" content="Application pédagogique de conjugaison française CP-CM2">
  <title>Conjugaison — Étude de Langue</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════════════════════
     PAGE 1 — FORM / CONFIGURATEUR
     ══════════════════════════════ -->
<div class="page" id="page-form">

  <!-- Header -->
  <header class="app-header">
    <div class="logo">📖</div>
    <h1 id="app-title">Conjugaison <span id="app-sub">Étude de langue</span></h1>
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="fr" onclick="setLang('fr')">FR</button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="tr" onclick="setLang('tr')">TR</button>
    </div>
  </header>

  <!-- Scrollable form area -->
  <div class="scroll-area">
    <div id="section-level"></div>
    <div id="section-chars"></div>
    <div id="section-chartype"></div>
    <div id="section-genre"></div>
    <div id="section-tense"></div>
    <div id="section-sentences"></div>
    <div id="section-settings"></div>
  </div>

  <!-- Fixed generate button -->
  <div class="generate-bar">
    <button class="btn-generate" id="btn-generate">
      <span class="btn-icon">✨</span>Générer l'exercice
    </button>
  </div>

</div>


<!-- ══════════════════════════════
     PAGE 2 — TEXTE GÉNÉRÉ
     ══════════════════════════════ -->
<div class="page" id="page-text">

  <!-- Header -->
  <div class="text-header">
    <button class="btn-back" onclick="showPage('page-form')">
      <span id="btn-back-label">← Retour</span>
    </button>
    <div class="text-header-title">📄 Exercice</div>
    <button class="btn-correct" onclick="toggleCorrection()">
      <span id="btn-correct-label">✅ Corriger</span>
    </button>
  </div>

  <!-- Correction mode indicator bar -->
  <div class="correction-mode-bar" id="correction-bar">✅ Mode correction activé</div>

  <!-- Paper sheet -->
  <div class="paper-container">
    <div class="paper-sheet">
      <div class="paper-sheet-content" id="paper-content">
        <!-- Generated content injected here -->
      </div>
    </div>
  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <button class="btn-pdf" onclick="exportPDF()">
      <span>📄</span><span id="btn-pdf-label">Exporter PDF</span>
    </button>
    <button class="btn-new" onclick="generateExercise()">
      <span>🔄</span><span id="btn-new-label">Nouveau texte</span>
    </button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
